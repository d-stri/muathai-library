<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muay Thai Technique Library</title>
<style>
  /* ── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0e1a;
    color: #e8f0ff;
    min-height: 100vh;
  }

  /* ── Aurora canvas ────────────────────────────────────────── */
  #aurora-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 260px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ── Layout ───────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── Header ───────────────────────────────────────────────── */
  .header {
    padding-top: 20px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #e8f0ff;
  }
  .header p {
    font-size: 13px;
    color: #5a7a99;
    margin-top: 3px;
  }

  /* ── Section labels ───────────────────────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #2d4a66;
    margin-bottom: 7px;
    margin-top: 14px;
  }

  /* ── Tab rows ─────────────────────────────────────────────── */
  .tabs-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid rgba(100, 180, 255, 0.18);
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: #5a7a99;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab:hover {
    border-color: rgba(0, 229, 160, 0.3);
    color: #c0d8f0;
  }
  .tab.active {
    background: rgba(0, 229, 160, 0.12);
    border-color: rgba(0, 229, 160, 0.5);
    color: #00e5a0;
    font-weight: 500;
  }

  .sub-tab {
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid rgba(100, 180, 255, 0.12);
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    color: #3d5a7a;
    transition: all 0.15s;
    font-family: inherit;
  }
  .sub-tab:hover {
    color: #7a9cbf;
    border-color: rgba(100, 180, 255, 0.25);
  }
  .sub-tab.active {
    background: rgba(0, 180, 216, 0.13);
    border-color: rgba(0, 180, 216, 0.4);
    color: #00b4d8;
  }

  /* ── Search ───────────────────────────────────────────────── */
  .search-row {
    margin: 14px 0 6px;
  }
  .search-row input {
    width: 100%;
    padding: 9px 14px;
    border-radius: 10px;
    border: 0.5px solid rgba(100, 180, 255, 0.18);
    background: rgba(10, 20, 50, 0.7);
    color: #e8f0ff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-row input::placeholder { color: #2d4a66; }
  .search-row input:focus { border-color: rgba(0, 229, 160, 0.4); }

  /* ── Count label ──────────────────────────────────────────── */
  .count-label {
    font-size: 11px;
    color: #2d4a66;
    margin-bottom: 12px;
  }

  /* ── Card grid ────────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  /* ── Cards ────────────────────────────────────────────────── */
  .card {
    background: rgba(15, 20, 40, 0.82);
    border: 0.5px solid rgba(100, 180, 255, 0.13);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .card:hover {
    border-color: rgba(0, 229, 160, 0.3);
    background: rgba(15, 25, 55, 0.92);
  }
  .card.open {
    border-color: rgba(0, 229, 160, 0.4);
    background: rgba(10, 20, 45, 0.96);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: #e8f0ff;
    line-height: 1.35;
  }

  /* badges */
  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-general {
    background: rgba(123, 47, 255, 0.18);
    color: #a78bfa;
    border: 0.5px solid rgba(123, 47, 255, 0.3);
  }
  .badge-defence {
    background: rgba(0, 180, 216, 0.15);
    color: #38bdf8;
    border: 0.5px solid rgba(0, 180, 216, 0.3);
  }
  .badge-offence {
    background: rgba(0, 229, 160, 0.13);
    color: #34d399;
    border: 0.5px solid rgba(0, 229, 160, 0.3);
  }

  .card-summary {
    font-size: 13px;
    color: #5a7a99;
    line-height: 1.55;
  }

  /* expanded detail */
  .card-detail {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px solid rgba(100, 180, 255, 0.1);
  }
  .card-detail ul { list-style: none; }
  .card-detail li {
    font-size: 12px;
    color: #7a9cbf;
    line-height: 1.55;
    padding: 3px 0 3px 14px;
    position: relative;
  }
  .card-detail li::before {
    content: "—";
    position: absolute;
    left: 0;
    color: #2d4a66;
  }

  /* tags */
  .tags-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .ctag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    border: 0.5px solid rgba(100, 180, 255, 0.15);
    color: #3d5a7a;
  }

  /* empty state */
  .empty {
    grid-column: 1 / -1;
    padding: 50px 0;
    text-align: center;
    color: #2d4a66;
    font-size: 14px;
  }
</style>
</head>
<body>

<canvas id="aurora-canvas"></canvas>

  <div class="section-label" id="sub-label"></div>

  <div class="search-row">
    <input id="search" type="text" placeholder="Search techniques, tags...">
  </div>
  <div class="count-label" id="count-label"></div>
  <div class="grid" id="grid"></div>
</div>

/* ================================================================
   NAV STRUCTURE
   ----------------------------------------------------------------
   To add a new main category:
     1. Add it to MAIN_CATS array
     2. Add its sub-categories to SUB_CATS
     3. Set the 'main' and 'sub' fields on new technique objects
   ================================================================ */

const MAIN_CATS = [
  { id: 'all',     label: 'All' },
  { id: 'general', label: 'General' },
  { id: 'defence', label: 'Defence' },
  { id: 'offence', label: 'Offence' },
];

const SUB_CATS = {
  general: [
    { id: 'all-g',      label: 'All' },
    { id: 'stances',    label: 'Stances' },
    { id: 'guards',     label: 'Guards' },
    { id: 'footwork',   label: 'Footwork' },
    { id: 'principles', label: 'Principles' },
  ],
  defence: [
    { id: 'all-d',      label: 'All' },
    { id: 'def-kicks',  label: 'Legs / kicks' },
    { id: 'def-hands',  label: 'Punches / hands' },
    { id: 'def-knees',  label: 'Knees' },
    { id: 'def-clinch', label: 'Clinch' },
  ],
  offence: [
    { id: 'all-o',      label: 'All' },
    { id: 'off-kicks',  label: 'Legs / kicks' },
    { id: 'off-hands',  label: 'Punches / hands' },
    { id: 'off-knees',  label: 'Knees' },
    { id: 'off-clinch', label: 'Clinch' },
    { id: 'combos',     label: 'Combos' },
  ],
};

/* ================================================================
   APP STATE
   ================================================================ */
let mainTab  = 'all';
let subTab   = 'all';
let expanded = null;

/* ================================================================
   FILTERING
   ================================================================ */
function matchesFilter(d) {
  if (mainTab === 'all') return true;
  if (d.main !== mainTab) return false;
  const allIds = ['all', 'all-g', 'all-d', 'all-o'];
  if (allIds.includes(subTab)) return true;
  return d.sub === subTab;
}

/* ================================================================
   BADGE
   ================================================================ */
function getBadge(d) {
  const map = {
    general: ['badge-general', d.sub],
    defence: ['badge-defence', 'def'],
    offence: ['badge-offence', 'off'],
  };
  const [cls, label] = map[d.main] || ['badge-general', d.main];
  return `<span class="badge ${cls}">${label}</span>`;
}

/* ================================================================
   RENDER
   ================================================================ */
function render() {
  const q = document.getElementById('search').value.toLowerCase();

  const filtered = TECHNIQUES.filter(d => {
    const mf = matchesFilter(d);
    const mq = !q || (d.title + ' ' + d.sum + ' ' + d.tags.join(' ')).toLowerCase().includes(q);
    return mf && mq;
  });

  /* Main tabs */
  document.getElementById('main-tabs').innerHTML = MAIN_CATS.map(c =>
    `<button class="tab${mainTab === c.id ? ' active' : ''}" onclick="setMain('${c.id}')">${c.label}</button>`
  ).join('');

  /* Sub tabs */
  const subLabelEl  = document.getElementById('sub-label');
  const subTabsEl   = document.getElementById('sub-tabs');
  const subs        = SUB_CATS[mainTab];
  if (subs) {
    subLabelEl.textContent = 'Subcategory';
    subTabsEl.innerHTML = subs.map(c =>
      `<button class="sub-tab${subTab === c.id ? ' active' : ''}" onclick="setSub('${c.id}')">${c.label}</button>`
    ).join('');
  } else {
    subLabelEl.textContent = '';
    subTabsEl.innerHTML = '';
  }

  /* Count */
  document.getElementById('count-label').textContent =
    `${filtered.length} technique${filtered.length !== 1 ? 's' : ''}`;

  /* Cards */
  const gridEl = document.getElementById('grid');
  if (!filtered.length) {
    gridEl.innerHTML = '<div class="empty">No techniques found</div>';
    return;
  }

  gridEl.innerHTML = filtered.map(d => {
    const isOpen = expanded === d.id;
    return `
      <div class="card${isOpen ? ' open' : ''}" onclick="toggleCard(${d.id})">
        <div class="card-head">
          <div class="card-title">${d.title}</div>
          ${getBadge(d)}
        </div>
        <div class="card-summary">${d.sum}</div>
        ${isOpen ? `
          <div class="card-detail">
            <ul>${d.detail.map(x => `<li>${x}</li>`).join('')}</ul>
            <div class="tags-row">
              ${d.tags.map(t => `<span class="ctag">${t}</span>`).join('')}
            </div>
          </div>` : ''}
      </div>`;
  }).join('');
}

/* ================================================================
   STATE SETTERS
   ================================================================ */
function setMain(id) {
  mainTab  = id;
  subTab   = id === 'general' ? 'all-g'
           : id === 'defence'  ? 'all-d'
           : id === 'offence'  ? 'all-o'
           : 'all';
  expanded = null;
  render();
}

function setSub(id) {
  subTab   = id;
  expanded = null;
  render();
}

function toggleCard(id) {
  expanded = expanded === id ? null : id;
  render();
}

document.getElementById('search').addEventListener('input', render);

/* ================================================================
   AURORA ANIMATION
   ================================================================ */
const canvas = document.getElementById('aurora-canvas');
const ctx    = canvas.getContext('2d');
let W, H, tick = 0;

const AURORA_BANDS = [
  { y: 0.30, amp: 30, freq: 0.0018, speed: 0.0007, r: 0,   g: 229, b: 160, width: 95  },
  { y: 0.18, amp: 20, freq: 0.0022, speed: 0.0011, r: 0,   g: 180, b: 216, width: 68  },
  { y: 0.42, amp: 24, freq: 0.0014, speed: 0.0005, r: 123, g: 47,  b: 255, width: 78  },
  { y: 0.12, amp: 15, freq: 0.0028, speed: 0.0015, r: 0,   g: 229, b: 160, width: 52  },
  { y: 0.50, amp: 18, freq: 0.0016, speed: 0.0008, r: 0,   g: 180, b: 216, width: 58  },
];

/* stable star positions (seeded by index) */
const STARS = Array.from({ length: 90 }, (_, i) => ({
  x: ((i * 137.508) % 1),
  y: ((i * 73.137)  % 1),
  r: i % 9 === 0 ? 1.4 : 0.7,
  a: i % 7 === 0 ? 0.9 : 0.5,
}));

function resizeCanvas() {
  W = canvas.parentElement.clientWidth || window.innerWidth;
  H = 260;
  canvas.width  = W;
  canvas.height = H;
}

function drawFrame() {
  ctx.clearRect(0, 0, W, H);

  /* night sky */
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  /* stars */
  STARS.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${s.a})`;
    ctx.fill();
  });

  /* aurora bands */
  AURORA_BANDS.forEach(b => {
    const pts = [];
    for (let x = 0; x <= W; x += 4) {
      const y = b.y * H
        + Math.sin(x * b.freq + tick * b.speed * 1000) * b.amp
        + Math.cos(x * b.freq * 1.7 + tick * b.speed * 700) * b.amp * 0.4;
      pts.push([x, y]);
    }

    [[0.28, b.width * 1.2], [0.50, b.width * 0.55], [0.22, b.width * 0.28]].forEach(([alpha, hw]) => {
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1] - hw);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1] - hw);
      for (let i = pts.length - 1; i >= 0; i--) ctx.lineTo(pts[i][0], pts[i][1] + hw);
      ctx.closePath();
      ctx.fillStyle = `rgba(${b.r},${b.g},${b.b},${alpha})`;
      ctx.fill();
    });
  });

  /* fade into page */
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   'rgba(10,14,26,0)');
  grad.addColorStop(0.55,'rgba(10,14,26,0)');
  grad.addColorStop(1,   'rgba(10,14,26,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  tick++;
  requestAnimationFrame(drawFrame);
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
drawFrame();
render();
</script>
