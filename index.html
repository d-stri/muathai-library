<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muay Thai — Technique Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600&family=Sarabun:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --cream:  #f0ebe0;
  --paper:  #e6dece;
  --ink:    #1a1410;
  --ink2:   #3a2e22;
  --ink3:   #6b5a45;
  --ink4:   #a89880;
  --ink5:   #cfc0a8;
  --red:    #8b1a1a;
  --red2:   #b52020;
  --gold:   #c8960a;
  --gold2:  #9a7008;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────────────────── */
.site-header {
  background: var(--ink);
  position: relative;
  overflow: hidden;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 24px 0;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 0;
}
.header-eyebrow {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.28em;
  color: var(--ink4);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.header-title {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1.05;
  color: var(--cream);
}
.header-title span { color: var(--red2); }
.header-sub {
  font-size: 12px;
  color: var(--ink4);
  margin-top: 8px;
  font-weight: 300;
  letter-spacing: 0.04em;
  padding-bottom: 24px;
}
.header-art { display: flex; align-items: flex-end; }

/* ── BORDER STRIP ────────────────────────────────────────────── */
.border-strip {
  height: 6px;
  background: var(--ink2);
  border-top: 1px solid var(--red);
  border-bottom: 1px solid var(--gold);
  background-image: repeating-linear-gradient(90deg,transparent 0,transparent 20px,var(--red) 20px,var(--red) 21px);
}

/* ── MOTIF BAR ───────────────────────────────────────────────── */
.motif-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 10px 24px;
  border-bottom: 1px solid var(--ink5);
  background: var(--cream);
}

/* ── APP LAYOUT ──────────────────────────────────────────────── */
.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 24px 60px;
}

/* ── NAV ─────────────────────────────────────────────────────── */
.nav-block { margin-top: 14px; }
.nav-label {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink4);
  margin-bottom: 7px;
}
.tabs-row { display: flex; gap: 5px; flex-wrap: wrap; }

.tab {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.06em;
  padding: 5px 14px;
  border: 1px solid var(--ink5);
  background: transparent;
  color: var(--ink3);
  cursor: pointer;
  transition: all 0.1s;
  text-transform: uppercase;
}
.tab:hover { border-color: var(--ink2); color: var(--ink); background: var(--paper); }
.tab.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }

.sub-tab {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 4px 11px;
  border: 1px solid var(--ink5);
  background: transparent;
  color: var(--ink4);
  cursor: pointer;
  transition: all 0.1s;
  text-transform: uppercase;
}
.sub-tab:hover { border-color: var(--ink3); color: var(--ink2); }
.sub-tab.active { background: var(--red); border-color: var(--red); color: var(--cream); }

.fourth-tab {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 10px;
  letter-spacing: 0.04em;
  padding: 3px 10px;
  border: 1px solid var(--ink5);
  background: transparent;
  color: var(--ink4);
  cursor: pointer;
  transition: all 0.1s;
  text-transform: uppercase;
}
.fourth-tab:hover { border-color: var(--gold2); color: var(--gold2); }
.fourth-tab.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }

/* ── DIVIDER / SEARCH ────────────────────────────────────────── */
.divider { height: 1px; background: var(--ink5); margin: 16px 0 12px; }
.search-wrap input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--ink2);
  background: var(--paper);
  color: var(--ink);
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  outline: none;
}
.search-wrap input::placeholder { color: var(--ink5); }
.search-wrap input:focus { border-color: var(--ink); }
.count-label {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--ink4);
  text-transform: uppercase;
  margin: 8px 0 14px;
}

/* ── GRID ────────────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1px;
  background: var(--ink5);
  border: 1px solid var(--ink5);
}
.empty {
  grid-column: 1/-1;
  background: var(--cream);
  padding: 50px;
  text-align: center;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--ink4);
  text-transform: uppercase;
}

/* ── CARDS ───────────────────────────────────────────────────── */
.card {
  background: var(--cream);
  padding: 13px 15px;
  cursor: pointer;
  transition: background 0.1s;
}
.card:hover { background: var(--paper); }
.card.open  { background: var(--ink); color: var(--cream); }

.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 5px;
}
.card-title {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--ink);
  line-height: 1.3;
}
.card.open .card-title { color: var(--cream); }

.badge {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid;
  white-space: nowrap;
  flex-shrink: 0;
}
.bg  { border-color: var(--ink3);  color: var(--ink3); }
.bd  { border-color: #1a4a6b;      color: #1a4a6b; }
.bo  { border-color: var(--red);   color: var(--red); }
.bm  { border-color: var(--gold2); color: var(--gold2); }
.btr { border-color: #2a5a3a;      color: #2a5a3a; }
.card.open .bg  { border-color: var(--ink5); color: var(--ink5); }
.card.open .bd  { border-color: #6aaad4;     color: #6aaad4; }
.card.open .bo  { border-color: var(--red2); color: var(--red2); }
.card.open .bm  { border-color: var(--gold); color: var(--gold); }
.card.open .btr { border-color: #7abad4;     color: #7abad4; }

.card-summary { font-size: 12px; color: var(--ink3); line-height: 1.55; }
.card.open .card-summary { color: var(--ink5); }

.card-detail {
  margin-top: 11px;
  padding-top: 11px;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.card-detail ul { list-style: none; }
.card-detail li {
  font-size: 12px;
  color: var(--ink3);
  line-height: 1.6;
  padding: 2px 0 2px 14px;
  position: relative;
}
.card-detail li::before { content: "›"; position: absolute; left: 3px; color: var(--red); }
.card.open .card-detail li { color: var(--ink5); }
.card.open .card-detail li::before { color: var(--red2); }

.tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 9px; }
.ctag {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid var(--ink5);
  color: var(--ink4);
}
.card.open .ctag { border-color: rgba(255,255,255,0.18); color: var(--ink5); }

/* ── FOOTER ──────────────────────────────────────────────────── */
.site-footer {
  border-top: 1px solid var(--ink5);
  padding: 18px 24px;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-text {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink4);
}
</style>
</head>

<script>
/* ================================================================
   NAV TREE
   L1 → L2 → L3 → L4
   'all' sentinel at any level shows everything under that branch.
================================================================ */

  { id:'all',       label:'All' },
  { id:'general',   label:'General' },
  { id:'defence',   label:'Defence' },
  { id:'offence',   label:'Offence' },
  { id:'mechanics', label:'Mechanics' },
  { id:'trainer',   label:'Trainer notes' },
];

const L2 = {
  general:   [
    { id:'all-g',      label:'All' },
    { id:'stances',    label:'Stances' },

    { id:'all-d',      label:'All' },
    { id:'d-punch',    label:'Punches' },

    { id:'d-teep',     label:'Teep' },
    { id:'d-knee',     label:'Knees' },
    { id:'d-elbow',    label:'Elbows' },
    { id:'d-clinch',   label:'Clinch' },

    title:'Defending knees',
    sum:'Long guard, stiff arm palm into them. Pivot out. Counter with knee.',
    detail:['Hook to head when they try to knee: right palm on forehead, slightly come up into their hook, frame on their forearm. Latch left around neck, put weight into them, left pendulum knee','Long guard, stiff arm palm into them. Pivot out. Stiff arm contact and rear knee','If knee is angled up: step to side and scissor sweep. If knee block is strong: switch hips, hand on their instep and push while pulling their neck'],
    tags:['knee','stiff arm','counter'] },

  /* ══ DEFENCE › ELBOWS ════════════════════════════════════════ */
  { id:66, l1:'defence', l2:'d-elbow',
    title:'Dracula guard (elbow defence)',
    sum:'Right hand on top of left shoulder. Chin buried in elbow crook. Left arm long guard. Point elbow at punches.',
    detail:['Dracula guard: right hand on top of left shoulder or palm out covering face with chin tucked and buried in elbow crook. Left arm long guard','Point elbow at punches. Use briefly. Plant heavy','Stiff arm contact and rear knee. Clinch entry by grabbing back of head/neck. Can elbow from both sides'],
    tags:['elbows','dracula','guard'] },

  /* ══ DEFENCE › CLINCH ════════════════════════════════════════ */
  { id:70, l1:'defence', l2:'d-clinch', l3:'dc-grip',
    title:'Preventing grabs',
    sum:'Shuck collar tie off with hook motion, shoulder bump, push forward with forearm.',
    detail:['Shuck collar tie off by hooking motion, bumping hard with shoulder, and pushing them forward with forearm','If they synch a good collar tie: shoulder bump the tie off and move them into arm triangle','If they arm triangle you: step leg deep in and inside thigh bump them while arming your arm over them to sweep'],
    tags:['clinch','escape','prevention'] },
  { id:71, l1:'defence', l2:'d-clinch', l3:'dc-grip',
    title:'Collar tie and double collar defence',
    sum:'Pinky side blade of forearm to slide down their forearm guiding arm inward.',
    detail:['When they come in for collar tie: use pinky side blade of forearm to slide down their forearm to guide their arm inward so they cannot establish strong collar tie','If they double collar and pull head down, arms locked: pinch their cup with fist and run them into ring or pin with shoulder against cage and pummel body lock when they move','If they stiff arm you in hips: swipe with knee, twist back and forth quickly, or turn them about face'],
    tags:['collar tie','prevention','escape'] },
  { id:72, l1:'defence', l2:'d-clinch', l3:'dc-lock',
    title:'Neck lock defence: swim arm',
    sum:'Hand to their hips. Same side foot inside theirs. Swim arm up and over. Swing opposite leg for knee.',
    detail:['Defence 1: hand to their hips, same side foot inside theirs, come up and under with opposite arm (opposite side of their neck control) all the way until armpit to armpit. Keep swinging over until hands on their head all while swinging opposite leg back and around for knee','or if you cannot push to armpit: when they knee on neck side pull other way while hips go bladed and shoot towards them when they knee'],
    tags:['neck lock','escape','pummel'] },
  { id:73, l1:'defence', l2:'d-clinch', l3:'dc-lock',
    title:'Neck lock defence: pummel and lock',
    sum:'If arm inside lock, push forward to create space and pummel other hand in.',
    detail:['Defence 2: if arm inside lock, push it forward to create space and pummel other hand in','If bad lock/pummel on you: lock back of their neck around the outside, slide lock up to crown then to their elbows, bow/step back to pull their head down'],
    tags:['neck lock','pummel','escape'] },
  { id:74, l1:'defence', l2:'d-clinch', l3:'dc-body',
    title:'Body lock defence: gorilla stance',
    sum:'Gorilla stance butt back. Pull arms behind their elbows. Squeeze elbows in. Sit and pull.',
    detail:['Gorilla stance butt back, pull arms so forearms are behind their elbows, wiggle butt back while hands slide down groin with palms facing forward, turn or squeeze their elbows inwards, sit butt back and down, pull their neck into armpit and turn (knee/sweep)','Shift weight onto toes, knuckles above their pectorals then push down','Shin shield full contact pushing into them and you pull their head/elbow towards you to extend them'],
    tags:['body lock','gorilla','escape'] },
  { id:75, l1:'defence', l2:'d-clinch', l3:'dc-body',
    title:'Body lock defence: butterfly and extensions',
    sum:'If they attack/grab knee shield: add butterfly. If they knee shield: grab under their leg and pull.',
    detail:['If they attack/grab knee shield: add a butterfly. If they knee shield: grab under their leg and pull','Body lock 4: wrap inside of both forearms tightly around their neck and where skull meets neck — big turn','Body lock turn: head position, hips back weight down, hand under armpits, pinch elbows, step to side, place hairline under their jaw while taking the wizzer, other hand on neck and knee'],
    tags:['body lock','butterfly','escape'] },
  { id:76, l1:'defence', l2:'d-clinch', l3:'dc-head',
    title:'Headlock defence',
    sum:'Push on jaw and bicep control. Over hook or pummel under. Get shin in.',
    detail:['Headlock defence 1: push on jaw and bicep control','Headlock defence 2: can over hook, or bring locking arm over their head to pummel under, get shin in'],
    tags:['headlock','pummel','escape'] },
  { id:77, l1:'defence', l2:'d-clinch', l3:'dc-pummel',
    title:'Pummel mechanics and 50/50',
    sum:'When their elbow point is high on your shoulder and wrenching neck: look towards it and pop under elbow.',
    detail:['When their elbow point is high on your shoulder and wrenching neck: look towards it and pop under elbow','50/50: when they come in for collar tie, use pinky side blade of forearm to slide down their forearm','Double pummel attempt: when they grab, attempt shoulder pop their arm toward opposite shoulder while doing hook motion with extended arm. Can shuck them into opposite side shovel hook'],
    tags:['pummel','50/50','clinch'] },

  /* ══ OFFENCE › PUNCHES ═══════════════════════════════════════ */
  { id:80, l1:'offence', l2:'o-punch', l3:'op-jab',
    title:'Jab: entries and setups',
    sum:'Jab as range finder, setup tool, and combo starter. Multiple exits.',
    detail:['Jab pull 1 foot (to right), lead uppercut jump with 2 feet, cross, right kick','Jab step lead upper, cross, right kick, right knee, hook, spear, pivot, slice down, stiff arm, kick, 4 count','Long jab knee: rev jab with right hand (keep it up), step out with right leg, left forearm pushes jaw, left knee'],
    tags:['jab','setup','combo'] },
  { id:81, l1:'offence', l2:'o-punch', l3:'op-jab',
    title:'Jab: step out options',
    sum:'Jab between their guard stepping left and step right while retracting.',
    detail:['Jab between their guard stepping left and step right while retracting. Look for openings in step pivot or switch','Jab switch kick. Jab switch hook, left kick. Jab pull, shift lead upper, cross, switch kick/knee','Step right, draw small circle, side teep. Parry jab stepping in for left knee or to right and switch kick'],
    tags:['jab','step out','combo'] },
  { id:82, l1:'offence', l2:'o-punch', l3:'op-cross',
    title:'Cross: step and angle exits',
    sum:'Step lead leg as cross lands to pivot. Bring up backfoot for hook or low kick.',
    detail:['Step backfoot up as cross lands for power or 12 follow up','Step right and land cross when left foot lands with momentum forward. Shoulder up and lasers on them','Cross, block, cross, roll, cross. Cross, block, cross, peel, right hook. Cross, block, cross, step right with the cross'],
    tags:['cross','step','angle'] },
  { id:83, l1:'offence', l2:'o-punch', l3:'op-hook',
    title:'Hook: Z hook and check hook',
    sum:'Z hook: bowling ball at their head. Jump 45° head on. Squat into pocket. Land knee on their inside thigh.',
    detail:['Z hook: bowling ball coming at their head, jump towards them 45 degrees head on, squat into pocket with shoulder positioned for bump. Land with knee into their inside thigh. Pivot right and throw left hook as they run away','Boxing check hook: step directly left where foot points all the way right from boxing stance. Shoulder up. Sit rear back when pivoting out 90° to land loaded Z hook','Set ups: cross to Z hook. Pendulum Z hook. Right low kick (shoulder open) to Z hook. Follow Z hook with cross or low kick if they move back'],
    tags:['hook','z hook','check hook'] },
  { id:84, l1:'offence', l2:'o-punch', l3:'op-hook',
    title:'Hook: roll hook, shovel hook, liver',
    sum:'Roll hook inside with U or circular head motion. Shovel hook to body and head.',
    detail:['Roll hook: once inside use U or circular head motion shapes to place hook. Can hook and half roll and hook same side, circling your head. Keep it short, do not twist too much, go to the body as well','Shovel hook: short and stabby to the body, big and powerful to the head — especially against southpaws','Liver 1: when elbows not tucked, step/slip, elbow on your pelvis, squat and rotate, aim for side of the abs. Liver 2: when elbows tucked, hook around the guard to the liver'],
    tags:['hook','roll','shovel'] },
  { id:85, l1:'offence', l2:'o-punch', l3:'op-upper',
    title:'Lead uppercut',
    sum:'Right leg shifts back as thrown. Squat and push until rotation. Can go 45 out or up.',
    detail:['At distance: right leg shifts back as it is thrown. Squat and push until rotation. Can go 45 out or up','If 45 out, must be Sagat-style curl for load','Right uppercut: feet same as cross, squat and push until rotation, snap the punch. Must always be set up'],
    tags:['uppercut','lead','setup'] },
  { id:86, l1:'offence', l2:'o-punch', l3:'op-peel',
    title:'Peels',
    sum:'Everything starts with step pivot cross between guard or big outside slip of cross.',
    detail:['Peel for left hook: step jab, step slip forward and right, right upper, peel right, left hook through guard. Aim for small opening in their collar bone so it hits when they tuck chin','Short cross, peel right hook. Long cross, peel with hopstep for distance, right hook. Long cross, step pivot and shoot another cross in their guard','Pull back leg a half step to intercept them with an overhand, pivot lead upper, peel right hook'],
    tags:['peel','inside','combo'] },
  { id:87, l1:'offence', l2:'o-punch', l3:'op-trap',
    title:'Hand traps',
    sum:'Touch hands and control their guard to set up strikes and knees.',
    detail:['Touch hands and pull down to right hip while right leg sweeps outside of their lead leg, follow with knee','Touch hands, right palm on their fist, throw left knee while left hand swipes their hand across body, left arm protect face','Fake shovel hook to body and uppercut through guard for latch left knee. Stiff arm: shoulder extension, weight down into chest, or squat weight up into chest'],
    tags:['traps','clinch entry','knees'] },
  { id:88, l1:'offence', l2:'o-punch', l3:'op-pocket',
    title:'Pocket punching',
    sum:'Short stabbing punches inside. Use frames and rolls between inside positions.',
    detail:['Bump 45° up with shoulder to make space. Head always looks forward into them. Use bottom elbow to pin them, high hand on eyebrow','Roll between inside Philly shell and middle positions. Use frames to transition between punches and inside positions','When they are in Philly shell: jab body to open up right hand. Time the shoulder roll. When they use pressure: lead knee inside theirs and step behind them'],
    tags:['inside','pocket','clinch'] },

  /* ══ OFFENCE › KICKS ══════════════════════════════════════════ */
  { id:90, l1:'offence', l2:'o-kick', l3:'ok-right', l4:'okr-body',
    title:'Right body kick',
    sum:'Kick through to their far shoulder. 45° on contact so they cannot come in.',
    detail:['Arm drops not swings while shoulder engages lats hard. Stand tall and pivot hips through, humping hard. Slide back after','Be ready to teep if they come in. Ready to pivot if they are coming in. Ready to clinch if they are really coming in','Into 50/50 with top arm opposite of kick thrown'],
    tags:['right kick','body','power'] },
  { id:91, l1:'offence', l2:'o-kick', l3:'ok-right', l4:'okr-head',
    title:'Right head kick',
    sum:'Chop down into neck. Come up vertical. Pivot hard on standing leg. All hip.',
    detail:['Kick arm straight down with shoulder straight up, rear hand protect face, all hip. Stand tall','No catch: right kick and make brief contact before externally rotating hip and retracting leg'],
    tags:['right kick','head','finish'] },
  { id:92, l1:'offence', l2:'o-kick', l3:'ok-right', l4:'okr-fake',
    title:'Right kick fakes and strategies',
    sum:'Ensure they check, then punish the check. Multiple exits off each fake.',
    detail:['Fake right kick to ensure they check, then stiff arm and leg kick. Or step to kick under their check. Or rear leg comes up to narrow stance, switch kick','Or liver hook or sprint cross. Or keep shoulder forward during fake, right cross, head kick. Or turn kick into teep when close to their check','Or rear foot steps in front during fake, switch kick from southpaw. Or kick their check lightly, scoop heel, side teep their thigh, switch knee'],
    tags:['right kick','fakes','deception'] },
  { id:93, l1:'offence', l2:'o-kick', l3:'ok-right', l4:'okr-catch',
    title:'Right kick punch (kick caught situation)',
    sum:'Kick punch: kick and do not cover chin with shoulder so you can load the punch.',
    detail:['Kick punch: kick and do not cover chin with shoulder so you can load the punch. Head moves down and forward as leg kicks directly back and up','Land hopping into right kick if going left. Land while left slapping if going right — do not rotate too much','Or land and sink into liver shot leg kick'],
    tags:['kick punch','caught','combo'] },
  { id:94, l1:'offence', l2:'o-kick', l3:'ok-left',
    title:'Left body kick',
    sum:'Courtesy step back. More hip. Small switch with hips engaged. Shoulder forward. Relax.',
    detail:['Do not have face opening on return. Dick to face. More hip. Small switch with hips engaged and shoulder forward. Relax','Left kick when they arm block: switch right kick','Left kick, spring directly into right low kick'],
    tags:['left kick','body','switch'] },
  { id:95, l1:'offence', l2:'o-kick', l3:'ok-left',
    title:'Left head kick',
    sum:'Switch, step, or shift weight to backfoot. Small switch with hips engaged.',
    detail:['Left high: switch, step, or shift weight to backfoot','Switch in place, fake kick, step in 12. Switch in place, right (lead) hook, left kick','Double switch right kick. Stiff arm switch moving backward'],
    tags:['left kick','head','switch'] },
  { id:96, l1:'offence', l2:'o-kick', l3:'ok-leg',
    title:'Pendulum leg kick',
    sum:'From fingertip distance. Instep deep all the way in on contact. Sit down on kick.',
    detail:['Kick as soon as you load. Pendulum from distance where fingertips can touch them. Spread their legs. Instep is deep all the way in on contact','Keep shoulders inline the entire time and during return. Small opening with the hip to aim trajectory 45° right of center. Should be able to use it as a pick. Sit down on kick slightly and aim low','Sting with pendulum. Fake it with a small hump flipping hips left, chip with right low kick'],
    tags:['leg kick','pendulum','power'] },
  { id:97, l1:'offence', l2:'o-kick', l3:'ok-leg',
    title:'Step out leg kick',
    sum:'Jab and step right on retraction. Right low kick. Shoulders up for hook.',
    detail:['Jab and step right on retraction (after already positioned to the right) right low kick','Shoulders up (for hook) and intercept their cross while throwing rear knee, or 2-3 low-low kick, or kickpunch step left knee, or fake low kick and lead uppercut low kick','If they jab and you are positioned to the right: land 45° lowkick from outside the jab moving backward. If they hook: chop down'],
    tags:['leg kick','step out','setup'] },
  { id:98, l1:'offence', l2:'o-kick', l3:'ok-fake',
    title:'Kick fakes: left side',
    sum:'Fake pendulum, double switch, stiff arm switch moving backward.',
    detail:['Circle right, galloping, land in switch going backwards. Switch in place, fake kick, step in 12','Double switch right kick. Switch, switch right flying knee. Stiff arm switch moving backward','Fake pend: sting with pendulum. Fake it with a small hump, chip with right low kick. Pendulum 70% power, small switch and bomb left high kick'],
    tags:['fakes','left kick','deception'] },
  { id:99, l1:'offence', l2:'o-kick', l3:'ok-fake',
    title:'Kick fakes: right side',
    sum:'Fake right kick while sliding rear foot up — multiple exits.',
    detail:['Fake right kick while sliding rear foot up: stiff arm and leg kick, or step to kick under their check, or rear leg up to narrow stance switch kick','Or liver hook or sprint cross. Or keep shoulder forward during fake, right cross, head kick. Or turn kick into teep getting close to their check','Squat kick, (check) kick punch, strong cross strong kick, fake kick teep'],
    tags:['fakes','right kick','deception'] },

  /* ══ OFFENCE › TEEP ══════════════════════════════════════════ */
  { id:100, l1:'offence', l2:'o-teep', l3:'ot-entry',
    title:'Teep entries and targets',
    sum:'Thigh, hip, bladder, solar plexus, high sternum, face. Use offensively, defensively, and to control.',
    detail:['Step with jab and as it retracts, pull right foot under hips for teep. Switch teep. Fake kick into teep. Slide teep. Thai hop teep. Side teep. Front kick','Rear teep to leg, land under hips, front teep. Mongatoon punch, elbow, or knee combo into kick. Question mark either side','Fake rear teep, land feet inside, latch top grip, push and pull into curved knee'],
    tags:['teep','range','setup'] },
  { id:101, l1:'offence', l2:'o-teep', l3:'ot-fake',
    title:'Teep fakes',
    sum:'Fake teep into knee, clinch, overhand, spinning elbow, or pivot out.',
    detail:['Fake teep, lift up, clothesline them, lead foot lands behind between legs as tabletop and drop into them','Fake teep, lift up, spinning elbow. Fake teep, pivot out','Fake rear teep switch pivot hook southpaw, kick (or step deep behind while hook hand in front of hips and sweep)'],
    tags:['teep','fakes','setup'] },
  { id:102, l1:'offence', l2:'o-teep', l3:'ot-fake',
    title:'Teep to knee and kick combos',
    sum:'Rear teep: land, step it up, left knee. Right kick to teep. Fake rear teep to switch kick.',
    detail:['Rear teep: land rear teep, step it up and left knee. Right kick to teep','Fake rear teep, step to their right side while posting/moving them, switch kick. Fake rear teep, fake rear teep (knee in front of body), hop switch back into right kick','Fake rear teep, land feet inside, latch top grip, push and pull into curved knee'],
    tags:['teep','knee','combo'] },

  /* ══ OFFENCE › KNEES ══════════════════════════════════════════ */
  { id:110, l1:'offence', l2:'o-knee', l3:'on-long',
    title:'Long knee',
    sum:'Right shoulder up. Hand fully extended onto their head. Hip fully extended. Point toes. Left shield up.',
    detail:['Left shield up. When tall use long knee — when posture breaks switch to latch knee. Watch for left hook — be ready to throw left knee at same time','Touch/pull hands then long knee. Step knee: set up with right teep or jab cross, grab head','Better to have some connection with long knee'],
    tags:['long knee','setup','distance'] },
  { id:111, l1:'offence', l2:'o-knee', l3:'on-latch',
    title:'Latch knee',
    sum:'Small skip hop forward then large step in. Grab opposite shoulder behind neck. Other side guard up.',
    detail:['Small skip hop forward before and/or after a large step in and grab their opposite shoulder behind the neck. Other side guard up! to knee','When they dip and come up: latch onto them and pull their head down while pinning their arms to set up switch knee','Fake into left knee: teep, lead teep foot position (under hips), left rear leg up and forward slightly while loading the hips, left knee'],
    tags:['latch','grab','clinch'] },
  { id:112, l1:'offence', l2:'o-knee', l3:'on-skip',
    title:'Skip knee and pendulum knee',
    sum:'From neck and bicep control: arch like a cat, front foot raises, back leg slides back, hump and shoot.',
    detail:['Skip knee: from neck and bicep control, arch like a cat, front foot raises while back leg slides back, hump and shoot knee','Fake skip knee: back leg slides back to load rear knee, shoot lead knee straight up instead','Pendulum knee: from neck and bicep, weight falls forward on to them, as they move back feet pendulums forward and lead leg straight knee up'],
    tags:['skip knee','pendulum','clinch'] },
  { id:113, l1:'offence', l2:'o-knee', l3:'on-curved',
    title:'Curved and round knee',
    sum:'Round knee: same motion as body kick for short range. Point the toe.',
    detail:['Hollow body with butt back. Push off hard and hump with only the kneeing side hip. Momentum forward and hips extended as if kicking','Shoulder in front of face. Heel to butt. Round knee: same motion as body kick for short range, point the toe','Curved knee: after some straight ones. Supergirl knee: pull with arms while push knee'],
    tags:['curved','round','short range'] },
  { id:114, l1:'offence', l2:'o-knee', l3:'on-jump',
    title:'Jump knees',
    sum:'Squat right jump knee. Pendulum left jump knee. Right switch jump knee. Left switch jump knee.',
    detail:['Jump curve knee: bring standing leg in middle of body while other hip opens and bring knee in and down, standing leg hops to outside of their feet','Step curve knee, smack feet together, jump curve knee, push pull straight knee. Teep, knee, sweep','Heel strike, supergirl knee. Supergirl knee: pull with arms while push knee'],
    tags:['jump knee','power','finish'] },

  /* ══ OFFENCE › ELBOWS ════════════════════════════════════════ */
  { id:120, l1:'offence', l2:'o-elbow', l3:'oe-types',
    title:'Elbow types',
    sum:'Horizontal, spear, down elbow, tomahawk. Retract shoulders for first elbow.',
    detail:['Horizontal elbow: in clinch pull their elbow to their pectoral and same side leg moves back an inch, rotate into elbow','Spear elbows: spear elbow with extension to start combo. Pin the forearm near their elbow and extend brace to set up targets','Down elbow: slice down — use instead of horizontal to deal with a guard head on. Tomahawk elbow: chops/spikes down with extension, use body weight'],
    tags:['elbow','types','mechanics'] },
  { id:121, l1:'offence', l2:'o-elbow', l3:'oe-combo',
    title:'Elbow combos and entries',
    sum:'Teep, knee same side, elbow same side, other elbow. Can do for both sides.',
    detail:['Teep, knee same side, elbow same side, other elbow — can do for both sides','Push guard and spear elbow. Push pull for slicing. Follow up with more elbows or grab them','Up elbows after pummeling. Kick from double bicep control by making a little bit of space with feet'],
    tags:['elbow','combo','clinch'] },

  /* ══ OFFENCE › CLINCH ════════════════════════════════════════ */
  { id:130, l1:'offence', l2:'o-clinch', l3:'oc-entry',
    title:'Clinch entries: teep and fake entries',
    sum:'Fake rear teep step foot up, forearm chop their neck and latch. Lead knee inside theirs.',
    detail:['Fake rear teep step foot up, forearm chop their neck and latch, lead knee inside theirs with weight causing off balance, left hand stuffs cross, push and pull into left knee','Right hand slaps their lead and pull in, then left slaps and pulls in their right, right hand shoots through neck, push into them with forearm, pull into latch while right knee and control their bicep/pin','Step grab both hands inward and pull in for long knee'],
    tags:['entry','fake teep','clinch'] },
  { id:131, l1:'offence', l2:'o-clinch', l3:'oc-entry',
    title:'Clinch entries: hook and slip',
    sum:'Hooking entrance: land crook of elbow around their arm or neck. Head into open space.',
    detail:['Hooking entrance: set up with fake body jab or in pocket. Similar motion to left hook (or overhand), land crook of elbow around their outside arm or neck, head goes into open space under their jaw on other side, hip to hip and knee','Missed hook: if you miss a hook and it hits through and behind their lead guard, sink in and smother while holding arm between chest and forearm pinched','Slip entrance: slip jab, shoot left hand over their shoulder while head to their pectoral'],
    tags:['entry','hook','slip'] },
  { id:132, l1:'offence', l2:'o-clinch', l3:'oc-entry',
    title:'Clinch entries: bury in and inside boxing',
    sum:'Jab chest hard, while retracting dip and come up into them aggressively.',
    detail:['Jab chest hard, while retracting dip and come up into them aggressively (headbutt with guard up): wrap neck, pin their other hand, go to hip, go to shoulder, knee their back, when they arch sweep. Or shove off hooks and low kick','Inside boxing: forehead to their pectoral, swipe hips into underhook, up into lock position. If underhook get stuck: shuck them or pull their other side elbow in to open up space or turn them','Rolle entrance: roll into securing your left arm across front of their right hip, stepping lead foot inside their lead foot with knee pointing into their thigh, right palm on forehead while ear against their shoulder blade, forward momentum into hook left kick'],
    tags:['entry','bury','inside boxing'] },
  { id:133, l1:'offence', l2:'o-clinch', l3:'oc-lock',
    title:'Neck lock: long lock',
    sum:'Constant forehead pressure into their artery. One arm crook against neck. Wide heavy stance.',
    detail:['Hips in. Constant forehead pressure into their artery. One arm straight with crook of elbow/forearm against neck, hand behind their hand. Rotate shoulder into them','Other arm locks perpendicular behind neck. Feet wide and stance heavy — when feet come together or turn sideways then whip them to ground','Always head pressure horizontal direction into them. Hairline into their jaw. Use forearms to tighten grip. Do not look down. Rip them. Curve knee, straight knee, face knee, break for elbows or inside boxing'],
    tags:['neck lock','long lock','knees'] },
  { id:134, l1:'offence', l2:'o-clinch', l3:'oc-lock',
    title:'Neck lock: short lock',
    sum:'Both elbows on front side of body. Blade of forearm into back of neck. Hairline on jaw. Squeeze.',
    detail:['Both elbows on front side of body. Hips in. Blade of forearm into back of neck, hairline on jawbone and forehead in their artery. Squeeze','Free hand locks and elbow digs into their pectoral. Wide heavy stance. Drag and turn them. Pinch shoulders up and prevent pummel','Can start if long clinch is relaxed until you can find position to vice grip them. If they frame on you: overhook + neck grip, put weight using forearms/biceps into their biceps pinching elbows in'],
    tags:['neck lock','short lock','squeeze'] },
  { id:135, l1:'offence', l2:'o-clinch', l3:'oc-bicep',
    title:'Bicep control offense',
    sum:'Turn them and send knees. Dick to target, open hip on neck control side and curve knee.',
    detail:['Dick to target, open up hip on neck control side and curve knee, aim for under your armpit. Break posture by punching elbow into their chest on neck control side','Hanging in their neck so force is going down and they cannot pick up their leg. Push and pull. Straight knee on bicep control side','Overhook the arm if it gets sketchy. Drop into heavy hand low kick combo and clinch again. Sweep when they knee'],
    tags:['bicep','control','knees'] },
  { id:136, l1:'offence', l2:'o-clinch', l3:'oc-bicep',
    title:'Bicep to neck transitions',
    sum:'Transition both to neck control before going up to crown.',
    detail:['Transition both to neck control before going up to crown','Transition from crown to bicep control: opposite foot moves back while hand moves to their bicep','Knee: pull turn with and load the knee'],
    tags:['bicep','neck','transition'] },
  { id:137, l1:'offence', l2:'o-clinch', l3:'oc-50',
    title:'50/50 position',
    sum:'Pummel in for bicep or neck control. Light lead leg — step out and pull head to floor.',
    detail:['50/50: pummel in for bicep or neck control','Light lead leg — step out and pull head to floor (their head must be forward of their hips) while turning them with neck arm. Lift up under elbow or under armpit with other arm. Use head as pivot point. Get hips in close (step in or pull them). Can catch their instep with bottom of foot'],
    tags:['50/50','dump','pummel'] },
  { id:138, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-heavy',
    title:'Heavy lead leg: closeline',
    sum:'Fake teep, knee high, step behind and between their legs, shoulder them down.',
    detail:['Fake teep, knee high, step behind and between their legs while shouldering them down to ground'],
    tags:['dump','heavy leg','closeline'] },
  { id:139, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-heavy',
    title:'Heavy lead leg: launch / hip throw',
    sum:'Step deep behind them, arm across belly button, fling up with hips and slam down.',
    detail:['If they get bladed/check: step deep behind them while arm goes across their belly button, under their rear, and fling them up with hips and slam down. Can set with low kick feint','Hip control: bicep control with one hand and other around their lower back all the way to opposite hip, stand tall, lift and rip with arm around back'],
    tags:['dump','heavy leg','launch'] },
  { id:140, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-heavy',
    title:'Heavy lead leg: body lock dump',
    sum:'Short low body lock squeeze hips to you. Forearm into ribs. Quad behind hamstring. Bump and dump.',
    detail:['Short low body lock squeeze their hips to you while transitioning to high body lock. Forearm squeeze into their ribs, turn at slight angle so quad sits behind their hamstring, bump quad up and dump','Body lock / double overhook on their body lock: use upper body to pull their head in front of their hips, lift and turn','Double pummel push down: heavy lead leg — pull their head towards your pocket and their hips to you to get 100% weight lead leg, then step up left so your right calf lands in and behind their lead calf, and sweep leg backwards out from under them while pushing directly down on their collar bone/jaw'],
    tags:['dump','heavy leg','body lock'] },
  { id:141, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-heavy',
    title:'Heavy lead leg: faceplant',
    sum:'From double pummel with big forward pressure: step leg and weight back while pulling head down from crown.',
    detail:['From double pummel they give you big pressure: step leg and weight back while pulling their head down from the crown'],
    tags:['dump','heavy leg','faceplant'] },
  { id:142, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-heavy',
    title:'Heavy lead leg: check sweeps',
    sum:'Three check sweep options when they check a kick.',
    detail:['Check: get perpendicular during check and push their chest down while kicking back of their standing leg','Check: when they check a kick, hook each other\'s insteps and swing their leg internally','Check: when they check and are too close, hand on their shoulder/head, other side hand on their hip/checking leg knee, sweep the foot'],
    tags:['check','sweep','heavy leg'] },
  { id:143, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-light',
    title:'Light lead leg: wizzer',
    sum:'Loop one arm around their arms over top and kick out leg on same side.',
    detail:['Light lead leg — wizzer: loop one arm around their arms over the top and kick out leg on same side'],
    tags:['dump','light leg','wizzer'] },
  { id:144, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-light',
    title:'Light lead leg: knee bump inside',
    sum:'Foot on inside of their foot (same side as bicep control). Push knee outwards into theirs.',
    detail:['Light lead leg — knee bump inside: foot on inside of their foot (same side as bicep control), push knee outwards into theirs, turn and pull down with other arm around neck while bringing foot back for knee','The bicep grip can switch to shooting under arm for armpit to armpit and try to reach their opposite ear'],
    tags:['dump','light leg','knee bump'] },
  { id:145, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-light',
    title:'Light lead leg: knee bump outside',
    sum:'Knee on outside of theirs. Collapse inward and pull down. Or use other leg to bump inside thigh.',
    detail:['Light lead leg — knee bump outside: knee on outside of theirs, collapse theirs in and pull down same side','Or use other leg to bump their inside thigh outward and pull them into the space your sweeping leg created'],
    tags:['dump','light leg','knee bump'] },
  { id:146, l1:'offence', l2:'o-clinch', l3:'oc-dump', l4:'od-light',
    title:'Light lead leg: 50/50 dump',
    sum:'Step out and pull head to floor. Head must be forward of their hips. Turn with neck arm.',
    detail:['50/50: light lead leg — step out and pull head to floor (their head must be forward of their hips) while turning them with neck arm','Lift up under elbow or under armpit with other arm. Use head as pivot point. Get hips in close','Can catch their instep with bottom of foot'],
    tags:['dump','light leg','50/50'] },
  { id:147, l1:'offence', l2:'o-clinch', l3:'oc-turn',
    title:'Pull turn and push turn',
    sum:'Go with your head direction. If they push your left side, pull left.',
    detail:['Pull turn: arm around neck touches opposite ear. Other foot step to side pulling hips together and establishing head control. Other hand lifts inside of elbow or pushes under armpit. Pivot and arm pulls head down into the space where you were — aim behind where you were','Push turn: when pull turn doesn\'t work, turn other way — arm around neck uses elbow as fulcrum to push their head into where hip was as hips pivot away','Double pummel: forehead on jaw use as pivot point and step, shift weight back, look behind you to launch while pulling backward. When they pummel or knee or off balance — go with head direction'],
    tags:['turn','pivot','clinch'] },
  { id:148, l1:'offence', l2:'o-clinch', l3:'oc-turn',
    title:'Tripping',
    sum:'Push and step out around them. Tripping foot same as pulling arm. Trip them over leg rather than sweep.',
    detail:['Tripping: push and step out around them, tripping foot same as pulling arm, trip them over leg rather than sweep. Try to get them perpendicular. Use flat part of foot. If it fails: push pull into snap down','Ashi harai: step right foot to right, bring left foot to it into narrow stance, use momentum to small hop right foot to right and left foot sweeps their feet','Sequence: kosoto (outside far leg), koji (inside near leg), ashi (outside near leg)'],
    tags:['trip','sweep','off balance'] },
  { id:149, l1:'offence', l2:'o-clinch', l3:'oc-trap',
    title:'Clinch traps',
    sum:'Arm trap overhook, broken pummel, burning eagle, arm triangle.',
    detail:['Arm trap overhook: when you have overhook, hand fight on other side to bring their opposite arm inwards so you can grab their forearm with your overhook arm. Quickly establish neck control on other side, maintain head piece, transition overhook arm to double pummel','Broken pummel: when you break the frame on their neck control, use other side arm\'s bicep to scoop under their elbow, turn torso to get around it, transition to arm triangle','Burning eagle: hip and bicep control. Fight for their bicep to distract them. Bring bicep arm to belly. Use hip control arm to trap their arm. Maintain head control. Bring free arm up and use frame to replace head control, step back to extend them'],
    tags:['trap','overhook','arm triangle'] },

  /* ══ OFFENCE › COMBOS ════════════════════════════════════════ */
  { id:150, l1:'offence', l2:'o-combos', l3:'cb-12',
    title:'1-2 step out combos',
    sum:'12 step out as base. Low kick, leg kick, head kick, pull right knee exits.',
    detail:['12 step out 23 lowkick. 12 pivot head kick. 12 step out leg kick pull right knee. 12 pivot jab overhand','12 step out 1, overhand then roll into left hip arm across, lead foot inside, hook left kick','12 step out, 1, 2 (shotput style), sweep by dip into right arm across front of hip stepping all the way in, head up like a takedown, forward momentum and stand up launch'],
    tags:['combo','1-2','exit'] },
  { id:151, l1:'offence', l2:'o-combos', l3:'cb-kick',
    title:'Kick-punch combos',
    sum:'Kickpunch and punchkick — cross on kick return, kick on punch return.',
    detail:['Right kick, cross hook, right kick, hook cross, pendulum kick, cross','Side teep, mongatoon fake teep, overhand, liver, low kick','Kick, float check, teep. Leg kick, fake leg kick, when they check: stiff arm and leg kick'],
    tags:['combo','kicks','kickpunch'] },
  { id:152, l1:'offence', l2:'o-combos', l3:'cb-jab',
    title:'Jab combo chains',
    sum:'Jab as entry to full sequences with kicks, knees, and clinch exits.',
    detail:['Jab, lead upper, right hook, liver lowkick. Double jab, slip while cross at chest, hook, cross. Jab, body cross, lead upper low kick','Switch jab, inside kick, step back, fake teep face, jab, right kick. Switch jab, pivot, stiff arm push with body weight their upper arm, left kick','Body chest jab, stand up into right uppercut, hook pivot, overhand, liver low kick'],
    tags:['jab','combo','chain'] },
  { id:153, l1:'offence', l2:'o-combos', l3:'cb-step',
    title:'Stepping combinations',
    sum:'Land each foot with the punch. Head stays offline slipping both sides. Corkscrew shoulders inward.',
    detail:['12 step right, right upper hook cross, step forwards for 112. 12 step right, right upper hook cross, step left, 3-2-3','12 step right low kick hook. Step 1-2, short liver, hop out low kick, cross, switch kick','Dip jab, right upper, pull, cross, left elbow, grab switch knee, left kick'],
    tags:['stepping','combo','flow'] },
  { id:154, l1:'offence', l2:'o-combos', l3:'cb-fake',
    title:'Fakes and feint combos',
    sum:'Create reactions and punish them. Fake teep, fake kick, switch fakes.',
    detail:['Teep switch kick. Switch fake kick into teep switch kick. Fake teep, fake right kick, cross, right kick','1 pull 12 inside kick. 1 pull fake jab 23 low kick. Jab kick, step fake right kick stiff arm low kick','Teep knee, fake knee superman hook left hook low kick. Cross, right knee (one beat), fake cross right knee'],
    tags:['fakes','deception','combo'] },

  /* ══ OFFENCE › SOUTHPAW ══════════════════════════════════════ */
  { id:160, l1:'offence', l2:'o-south',
    title:'Against southpaws: positioning',
    sum:'Beware the left hand. If your lead foot inside their feet then jab. If outside then cross.',
    detail:['Beware the left hand. If your lead foot is inside their feet then jab, if outside then cross. Can do this as 12','Step left foot back inline with right, pivot backwards keeping shoulder up','Big step left, fake half-step left, step right, step left into centre as cross lands'],
    tags:['southpaw','positioning'] },
  { id:161, l1:'offence', l2:'o-south',
    title:'Against southpaws: punching',
    sum:'Jab through outside of their lead guard. When they adjust shoot jab or cross down the middle.',
    detail:['Jab through outside of their lead guard, when they adjust shoot jab or cross down the middle. Step left, cross between guard, peel right hook','Tap lead hand down to jab. Tap and loop over with hook. Angle left outside their feet, cross while slipping jab, hook, right kick','Mongatoon cross to body head hook. Mongatoon cross to chest, pivot lead uppercut. Mongatoon jab cross highkick'],
    tags:['southpaw','punching','angles'] },
  { id:162, l1:'offence', l2:'o-south',
    title:'Against southpaws: kicks and knees',
    sum:'Crush inside leg. Right knee: frame out with swinging arm.',
    detail:['Crush inside leg. Right knee: frame out with swinging arm','Hook step left, lead low kick. Lead hooks around guard. Rear shovel hooks','Slip outside their cross, right body hook. Slip their jab, throw cross same time. Mongatoon cross to chest, liver shot around guard, head kick'],
    tags:['southpaw','kicks','knees'] },

  /* ══ MECHANICS › PUNCHES ═════════════════════════════════════ */
  { id:170, l1:'mechanics', l2:'m-punch', l3:'mp-jab',
    title:'Jab mechanics',
    sum:'Bump from ribs and turn fist over. Step pushing off rear leg. Shoulder touches chin.',
    detail:['Bump from ribs and turn fist over. Can step pushing off with rear leg. Shoulder touches chin','Listen for the feet engagement with 1-2, shoulders relaxed forearm tight. Jab using strong backfoot relaxed with correct timing — can clear a lot of distance','Move head, step, and circle. Jab while blocking for hook, parrying jab, blocking uppercut. Keep shoulder up with elbows on front of ribs'],
    tags:['jab','mechanics','foundation'] },
  { id:171, l1:'mechanics', l2:'m-punch', l3:'mp-cross',
    title:'Cross mechanics',
    sum:'Power from backfoot into hip into shoulder. Everything comes forward across the centreline.',
    detail:['Lower stance. Power from backfoot into hip into shoulder. Elbow gets bumped off ribs when torso is completely turned. Everything (head) comes forward across the centreline','Full extension where right armpit over left knee (squeeze with thighs). Left shoulder forced to move backward. Arm finally snaps like a whip, shoulder touching chin. Backfoot pushes until hips/torso completely turned, heel pivots out as arm is released','Full core engagement — think throwing someone over your back. Forward or move to side, rotate to extension. If you miss, should not hyperextend'],
    tags:['cross','mechanics','foundation'] },
  { id:172, l1:'mechanics', l2:'m-punch', l3:'mp-hook',
    title:'Hook mechanics',
    sum:'Right shoulder shifts forward. Subtly dip and load. Twist. Pivot backfoot as it pushes through.',
    detail:['Right shoulder shifts forward, subtly dip and load, twist, pivot backfoot as it pushes through. Elbow is bumped and comes in line with fist','Head to the other side of the bag. Do not move head upwards. Land with knuckle. Do not pivot lead foot. Thumb horizontal at distance, thumb up inside','Headbutt slightly in front of the other side of their head. Jab hook with internal rotation of fist. Weight shift with right foot and shoulder into left foot. Head stays level'],
    tags:['hook','mechanics','foundation'] },
  { id:173, l1:'mechanics', l2:'m-punch', l3:'mp-upper',
    title:'Uppercut mechanics',
    sum:'Squat and push until rotation. Snap the punch. Must always be set up.',
    detail:['Lead uppercut: at distance, right leg shifts back as it is thrown. Squat and push until rotation. Can go 45 out or up. If 45 out: Sagat-style curl for load','Right uppercut: feet same as cross, squat and push until rotation, snap the punch. Must always be set up. Generally just goes up or straight to body','Relaxed rotation, squat down slightly, 45° out with right heel rotation out'],
    tags:['uppercut','mechanics','foundation'] },

  /* ══ MECHANICS › KICKS ═══════════════════════════════════════ */
  { id:180, l1:'mechanics', l2:'m-kick', l3:'mk-right',
    title:'Right kick mechanics',
    sum:'45° up for speed. 45° down after combo. Step deep. All hip through their legs.',
    detail:['45° up for speed (naked), 45° down after combo. Step deep, kick arm out, upper body turns over, head forward, ALL HIP through their legs, hard hip rotation','Land strong and exit with long guard or angle. Do not lean back','Right body kick: kick through to their far shoulder. 45° on contact. Arm drops not swings while shoulder engages lats hard. Stand tall and pivot hips through, humping hard'],
    tags:['right kick','mechanics','hip'] },
  { id:181, l1:'mechanics', l2:'m-kick', l3:'mk-left',
    title:'Left kick mechanics',
    sum:'Courtesy step back. More hip. Small switch with hips engaged. Shoulder forward.',
    detail:['Courtesy step back. Small switch with hips engaged and shoulder forward. Relax. Do not create face opening on return','Multiple kicks: fall into position in the pogo after kick so you can move in direction of kick. Slightly hop for double+ kick','Left kick while stepping back foot up rather than switching — to deal with punchers'],
    tags:['left kick','mechanics','hip'] },
  { id:182, l1:'mechanics', l2:'m-kick', l3:'mk-leg',
    title:'Leg kick mechanics',
    sum:'Your hip to their opposite hip. Weight moves directly through them. Shortest path.',
    detail:['Your hip to their opposite hip. Weight moves directly through them. Shortest path','Pendulum from distance where fingertips can touch them, spread their legs, instep is deep all the way in on contact. Keep shoulders inline the entire time. Small opening with hip 45° right of centre','Sit down on kick slightly and aim low. Should be able to use as a pick'],
    tags:['leg kick','mechanics','pendulum'] },
  { id:183, l1:'mechanics', l2:'m-kick', l3:'mk-teep',
    title:'Teep mechanics',
    sum:'Swipe with knee to load. Step to front foot arch to load. Side teep if caught.',
    detail:['Swipe with knee to load. Step to front foot arch to load. Side teep if they catch — can step all the way through, standing leg foot pivoted, locked, heel on ground, kicking foot comes down immediately into non-narrow stance','Superlek: slightly tip forward to maintain kick range with illusion of boxing range (leg kick, switch kick, teep, circle)','Front kick: flick foot up and to the side and teep'],
    tags:['teep','mechanics','foundation'] },

  /* ══ MECHANICS › KNEES ═══════════════════════════════════════ */
  { id:190, l1:'mechanics', l2:'m-knee',
    title:'Knee mechanics',
    sum:'Hollow body with butt back. Push off hard and hump with kneeing side hip only. Heel to butt.',
    detail:['Hollow body with butt back. Push off hard and hump with only the kneeing side hip. Momentum forward and hips extended as if kicking. Shoulder in front of face. Heel to butt','Watch for left hook — be ready to throw left knee at same time. Double up on knees same side — second lands during their breath — must be super quick','If you try to knee and they backup: turn it into a kick. If you miss a shot and overextended: use momentum for another shot (miss knee into kick, miss kick into knee)'],
    tags:['knee','mechanics','foundation'] },

  /* ══ MECHANICS › ELBOWS ══════════════════════════════════════ */
  { id:195, l1:'mechanics', l2:'m-elbow',
    title:'Elbow mechanics',
    sum:'Retract shoulders first. Elbows come downward with palm facing out using footwork and shoulder.',
    detail:['Retract shoulders for first elbow. Push guard and spear elbow. Push pull for slicing. Elbows should come downward with palm facing out using footwork and shoulder','Up elbow: flick hair back and use shoulder with footwork. Reverse elbow: step back foot forward and turn to load','Spinning elbow: 1-2 then slip into spin, butt back, keep tight, elbow comes downward to split guard'],
    tags:['elbow','mechanics','foundation'] },

  /* ══ MECHANICS › CLINCH ══════════════════════════════════════ */
  { id:200, l1:'mechanics', l2:'m-clinch', l3:'mc-posture',
    title:'Clinch posture and rules',
    sum:'No sissy gripping. Elbows on lower half of delts spreading outwards. Trex arms.',
    detail:['No sissy gripping. Elbows on lower half of delts spreading outwards. Prevent their strong neck grip by squeezing elbow inward','Keep feet wide. Trex arms. Keep strong proper posture. Do not wait to knee. Don\'t turn sideways. Don\'t have head in front of feet','Default to vice grip and hump knees up middle. Use head as pivot when turning. Constantly off balance and break their posture'],
    tags:['clinch','posture','rules'] },
  { id:201, l1:'mechanics', l2:'m-clinch', l3:'mc-pummel',
    title:'Pummeling mechanics',
    sum:'Double pummel: their hairline in your jaw. Wrap arm over top of both their arms, grab bicep.',
    detail:['Double pummel: their hairline in your jaw. Wrap arm all the way over top of both their arms and grab their bicep. Other arm wraps over first arm to grab your tricep. Sit and turn','Double pummel 1 attempt: when they grab, attempt to shoulder pop their arm toward opposite shoulder while doing hook motion with extended arm. Can shuck them into opposite side shovel hook','Tube of toothpaste: hand around to their other side ear to pop off their grip, pinky up underhook points to sky and slide horizontal down torso to lock them up'],
    tags:['pummel','clinch','mechanics'] },
  { id:202, l1:'mechanics', l2:'m-clinch', l3:'mc-pos',
    title:'Clinch positions reference',
    sum:'Double pummel, neck lock, neck and bicep, double bicep, body lock, hip and bicep, 50/50.',
    detail:['Neck lock: curved knees to shoulder blades and stomach, sit and turn them. Neck and bicep: turn them and send knees. Overhook arm if sketchy','Double bicep/extended: transitionary. Body lock: dump or turn into hip control','Hip and bicep control: use to control them. Transition from bicep to neck for offense. 50/50: pummel in for bicep or neck control'],
    tags:['clinch','positions','reference'] },

  /* ══ MECHANICS › FOOTWORK ════════════════════════════════════ */
  { id:210, l1:'mechanics', l2:'m-foot', l3:'mf-pull',
    title:'Pull mechanics',
    sum:'Emphasis on pushing foot, not leaning back. 1 or 2 foot pulls.',
    detail:['Pull 2 feet back then 1 foot cross. Pull 2 feet back slip inside jab, lead upper. Pull overhand over their jab. Pull to back right for leg kick — keep left shoulder up','Pull: right foot back 45° with toe pointed at them. Used for offense. Pull with 1 foot step to left or right','Pull smother: pull with one foot back, smother into their pectoral moving 2 feet in. Pull for cross: right shoulder up and slip while back foot comes back'],
    tags:['pull','mechanics','footwork'] },
  { id:211, l1:'mechanics', l2:'m-foot', l3:'mf-pivot',
    title:'Step pivot mechanics',
    sum:'Super small step to get angle. Do from outside for kicks, mid range for Dutch boxing.',
    detail:['Left step pivot: step out with lead foot and pivot. Right pivot: push hard step out with rear leg pushing hard with lead and turn staying in Ortho','Step pivot to stay outside of their cross. Be ready to check. Spam cross in between guard or counter right knee or pivot high kick','Step pivot with rear foot sliding up — teep. Step pivot right kick. Step pivot fake jab — cross or head kick'],
    tags:['pivot','step','mechanics'] },
  { id:212, l1:'mechanics', l2:'m-foot', l3:'mf-roll',
    title:'Roll mechanics',
    sum:'Step with both feet. Head goes directly to their pectoral. Head low but not too low. Balanced.',
    detail:['Step with both feet, head goes directly to their pectoral, head low but not too low, balanced and ready to enter pocket or strike back and go into taller stance','Can hook while rolling. Consider pivots after rolls for more distance','Come UP from rolls and slips — never punch downward'],
    tags:['roll','mechanics','boxing'] },
  { id:213, l1:'mechanics', l2:'m-foot', l3:'mf-peel',
    title:'Peel mechanics',
    sum:'Peel for left hook: step jab, step slip forward and right, right upper, peel right, left hook.',
    detail:['Peel for left hook: step jab, step slip forward and right, right upper, peel right, left hook through guard. Aim for small opening in collar bone so it hits when they tuck chin','Short cross peel right hook. Long cross peel with hopstep for distance, right hook. Long cross step pivot shoot another cross in their guard','Step back leg up past lead leg into southpaw while covering with hands, peel by replacing front foot with backfoot'],
    tags:['peel','mechanics','inside'] },
  { id:214, l1:'mechanics', l2:'m-foot', l3:'mf-slip',
    title:'Slip mechanics',
    sum:'Outside slip jab, outside slip cross, inside slip cross, inside slip jab.',
    detail:['Outside slip jab: bend knees, butt out, 45° in, headbutt punch, should graze side of head. Shoulder goes down and knee bends. Other side hand up. Can turn, momentum into arm, overhand, or squat and uppercut','Outside slip cross: push and pivot off backfoot like a cross is thrown. Think headbutt punch. Land uppercut/hook when their punch retracts','Inside slip cross: same as outside slip jab. Head straight forward. Inside slip jab: pivot like cross, head under punch, head forward, bonus points for grazing. Good overhand or long right knee'],
    tags:['slip','mechanics','boxing'] },
  { id:215, l1:'mechanics', l2:'m-foot', l3:'mf-sneak',
    title:'Step behind / sneak step mechanics',
    sum:'Upper body movement hides back foot stepping up. Multiple variations.',
    detail:['Slip step behind: head does not go forward and back while slipping, upper body slips hiding the back foot stepping up','Slip step-pivot step behind. Pull step behind. Step behind squat: after exploding squat directly under their hook, looping punch or grab','Stutter step step behind: fake with lead foot going forward, pull back foot, step behind'],
    tags:['step behind','sneak','entry'] },
  { id:216, l1:'mechanics', l2:'m-foot', l3:'mf-sprint',
    title:'Sprint step mechanics',
    sum:'Head drops under punch level. Both legs split. Rear leg/ankle totally straightened. Both feet land simultaneously.',
    detail:['Head drops under punch level while both legs split, rear leg/ankle totally straightened, both feet land at same time','Kinetic chain to fully extend through with cross. Can follow up with kick either side'],
    tags:['sprint step','mechanics','entry'] },
  { id:217, l1:'mechanics', l2:'m-foot', l3:'mf-feint',
    title:'Feint and stutter step mechanics',
    sum:'Fake pull, fake step left, fake step right. Minimize movement with ability to bail.',
    detail:['Fake pull correct: step while feinting, lead leg pushes while back foot pulls, back leg moves back into jab/cross/pendulum/right leg kick/L step/pivot. Used to engage by inching in. Minimize movement with ability to pull and bail','Fake step left: big 2 step left to get opponent to follow, then small half step left to fake (lead arm sells it), it stays put while small step up and right to angle inward for right hand as it clears their lead hand guard. Right hand lands while left foot lands','Fake step to hook: big 2 step left for them to follow, then half step out, lead foot closed the door while throwing hook, Tyson shift feet to angle'],
    tags:['feint','stutter','deception'] },

  /* ══ TRAINER NOTES › MONLIT ══════════════════════════════════ */
  { id:220, l1:'trainer', l2:'t-monlit',
    title:'Monlit: stance and punching',
    sum:'Arms apart, elbows out, butt slightly back, legs slightly bent, hips square, shoulders very relaxed, wide legs.',
    detail:['Stance: arms apart, elbows out, butt slightly back, legs slightly bent, hips square, shoulders very relaxed, wide legs apart. Step back: drag front leg, stay balanced, step out wide','One two: in a single step forward pushing off backfoot, momentum forward, pivot shoulders hips and ankle. Power from ribs. Good balance','Jab: forward or move to side, rotate to extension; step to side slightly before jab lands / as backfoot lands, head over hip. Cross: rotate heel out, momentum forward from backfoot, pause weight back/slightly centred before pulling left shoulder back, front shoulder forward, armpit over knee. If you miss, should not hyperextend'],
    tags:['monlit','stance','punching'] },
  { id:221, l1:'trainer', l2:'t-monlit',
    title:'Monlit: kicks and knees',
    sum:'Left kick: mini step forward if medium, switch if close, step through if far. Right kick: step out, turn hip, lift off foot more.',
    detail:['Hook: palm down, slightly load rotation (relaxed), weight shift with right foot and shoulder into left foot, head stays level','Right uppercut: relaxed rotation, squat down slightly 45° out with right heel rotation out. Knee: butt back to load, grab arm and shoulder. Front teep: step to front foot\'s arch to load','Left kick: mini step forward if medium, switch if close, step through if far. Right kick: step out, turn hip, lift off foot more, do not lean back. Double+ kick: slightly hop'],
    tags:['monlit','kicks','knees'] },
  { id:222, l1:'trainer', l2:'t-monlit',
    title:'Monlit: elbows and hook/knee combos',
    sum:'Hook, knee: can hold their arm (like for an elbow) to throw the knee.',

/* ================================================================
   APP STATE  (4 levels + search + expanded)
================================================================ */
let S = { l1:'all', l2:null, l3:null, l4:null, expanded:null };

/* default sub-level sentinels */
const DEF_L2 = { general:'all-g', defence:'all-d', offence:'all-o', mechanics:'all-m', trainer:'all-t' };

/* ================================================================
   FILTER
================================================================ */
function matches(d) {
  if (S.l1 !== 'all' && d.l1 !== S.l1) return false;
  const allSentinels = ['all','all-g','all-d','all-o','all-m','all-t'];
  if (S.l2 && !allSentinels.includes(S.l2) && d.l2 !== S.l2) return false;
  if (S.l3 && S.l3 !== 'all' && d.l3 !== S.l3) return false;
  if (S.l4 && S.l4 !== 'all' && d.l4 !== S.l4) return false;
  return true;
}

/* ================================================================
   BADGE
================================================================ */
const BADGE = { general:['bg','gen'], defence:['bd','def'], offence:['bo','off'], mechanics:['bm','mec'], trainer:['btr','trainer'] };
function badge(d) {
  const [cls, lbl] = BADGE[d.l1] || ['bg', d.l1];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

/* ================================================================
   RENDER
================================================================ */
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const items = T.filter(d => matches(d) && (!q || (d.title+' '+d.sum+' '+(d.tags||[]).join(' ')).toLowerCase().includes(q)));

  /* L1 tabs */
  document.getElementById('main-tabs').innerHTML = L1.map(c =>
    `<button class="tab${S.l1===c.id?' active':''}" onclick="go1('${c.id}')">${c.label}</button>`
  ).join('');

  /* L2 tabs */
  const L2b = document.getElementById('L2-block');
  const subs = L2[S.l1];
  if (subs) {
    L2b.style.display = '';
    document.getElementById('L2-tabs').innerHTML = subs.map(c =>
      `<button class="sub-tab${S.l2===c.id?' active':''}" onclick="go2('${c.id}')">${c.label}</button>`
    ).join('');
  } else { L2b.style.display = 'none'; }

  /* L3 tabs */
  const L3b = document.getElementById('L3-block');
  const thirds = S.l2 ? L3[S.l2] : null;
  if (thirds) {
    L3b.style.display = '';
    document.getElementById('L3-tabs').innerHTML = thirds.map(c =>
      `<button class="sub-tab${S.l3===c.id?' active':''}" onclick="go3('${c.id}')">${c.label}</button>`
    ).join('');
  } else { L3b.style.display = 'none'; }

  /* L4 tabs */
  const L4b = document.getElementById('L4-block');
  const fourths = S.l3 ? L4[S.l3] : null;
  if (fourths) {
    L4b.style.display = '';
    document.getElementById('L4-tabs').innerHTML = fourths.map(c =>
      `<button class="fourth-tab${S.l4===c.id?' active':''}" onclick="go4('${c.id}')">${c.label}</button>`
    ).join('');
  } else { L4b.style.display = 'none'; }

  /* count */
  document.getElementById('count-label').textContent = `${items.length} technique${items.length!==1?'s':''}`;

  /* cards */
  const g = document.getElementById('grid');
  if (!items.length) { g.innerHTML = '<div class="empty">No techniques found</div>'; return; }
  g.innerHTML = items.map(d => {
    const open = S.expanded === d.id;
    return `<div class="card${open?' open':''}" onclick="tog(${d.id})">
      <div class="card-head"><div class="card-title">${d.title}</div>${badge(d)}</div>
      <div class="card-summary">${d.sum}</div>
      ${open?`<div class="card-detail"><ul>${d.detail.map(x=>`<li>${x}</li>`).join('')}</ul>
      <div class="tags-row">${(d.tags||[]).map(t=>`<span class="ctag">${t}</span>`).join('')}</div></div>`:''}
    </div>`;
  }).join('');
}

/* ================================================================
   STATE SETTERS
================================================================ */
function go1(id) {
  S = { l1:id, l2:DEF_L2[id]||null, l3:null, l4:null, expanded:null };
  render();
}
function go2(id) {
  S.l2 = id;
  S.l3 = L3[id] ? 'all' : null;
  S.l4 = null;
  S.expanded = null;
  render();
}
function go3(id) {
  S.l3 = id;
  S.l4 = L4[id] ? 'all' : null;
  S.expanded = null;
  render();
}
function go4(id) {
  S.l4 = id;
  // if this level itself has sub-options (e.g. od-heavy, od-light), load them
  S.expanded = null;
  // check if this id has further L4 children
  if (L4[id]) {
    // re-use L4 as a recursive level: set l3=current l3, l4=id so next click is go3
    S.l3 = S.l4 = id; S.l4 = 'all';
  }
  render();
}
function tog(id) { S.expanded = S.expanded===id ? null : id; render(); }
document.getElementById('search').addEventListener('input', render);
render();
</script>
